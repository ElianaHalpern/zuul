name: Scaffold a new service

on:
  workflow_dispatch:
    inputs:
      port_context:
        required: true
        type: string
      service_name:
        required: true
        type: string
      owner:
        required: false
        type: string
      team:
        required: false
        type: string
      region:
        required: false
        type: string
      tier:
        required: false
        type: string
      repository_url:
        required: false
        type: string
      on_call_link:
        required: false
        type: string
      language:
        required: false
        type: string
      lifecycle:
        required: false
        type: string

jobs:
  scaffold-service:
    runs-on: ubuntu-latest
    env:
      ORG_NAME: ElianaHalpern

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Repository
        uses: port-labs/cookiecutter-gha@v1.1.1
        with:
          portClientId: ${{ secrets.PORT_CLIENT_ID }}
          portClientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          token: ${{ secrets.ORG_ADMIN_TOKEN }}
          portRunId: ${{ fromJson(inputs.port_context).runId }}
          repositoryName: ${{ inputs.service_name }}
          portUserInputs: '{"cookiecutter_app_name": "${{ inputs.service_name }}" }'
          cookiecutterTemplate: https://github.com/lacion/cookiecutter-golang
          blueprintIdentifier: "githubRepository"
          organizationName: ${{ env.ORG_NAME }}
          createPortEntity: true

      # FIX 1: Build properties JSON conditionally — skip empty optional enums
      - name: Build service properties
        id: build_props
        run: |
          PROPS="{}"
          if [ -n "${{ inputs.region }}" ]; then
            PROPS=$(echo "$PROPS" | jq --arg v "${{ inputs.region }}" '. + {"region": $v}')
          fi
          if [ -n "${{ inputs.tier }}" ]; then
            PROPS=$(echo "$PROPS" | jq --arg v "${{ inputs.tier }}" '. + {"tier": $v}')
          fi
          if [ -n "${{ inputs.on_call_link }}" ]; then
            PROPS=$(echo "$PROPS" | jq --arg v "${{ inputs.on_call_link }}" '. + {"on_call_link": $v}')
          fi
          if [ -n "${{ inputs.lifecycle }}" ]; then
            PROPS=$(echo "$PROPS" | jq --arg v "${{ inputs.lifecycle }}" '. + {"lifecycle": $v}')
          fi
          echo "props=$PROPS" >> $GITHUB_OUTPUT

      - name: Create Service in Port with all properties
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: UPSERT
          identifier: "${{ inputs.service_name }}"
          title: "${{ inputs.service_name }}"
          blueprint: "service"
          properties: ${{ steps.build_props.outputs.props }}
          relations: |
            {
              "repository": "${{ inputs.service_name }}"
            }

      # FIX 2: Always report run status back to Port
      - name: Report success to Port
        if: success()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: "SUCCESS"
          logMessage: "Service '${{ inputs.service_name }}' scaffolded and registered in Port ✅"

      - name: Report failure to Port
        if: failure()
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          baseUrl: https://api.port.io
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: "FAILURE"
          logMessage: "Failed to scaffold service '${{ inputs.service_name }}' ❌"
